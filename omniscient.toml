# Omniscient configuration for this repository (edit embedder/search settings to match your local setup).
languages = ["rust"]
strip_comments = true

# Test/fixture files (tests/, benches/, **/*.test.*, **/*.spec.*, **/*_test.*,
# **/test_*.py, **/conftest.py, **/__tests__/) are skipped by default. Set true
# to index them too.
index_tests = false

# Extra glob patterns to skip when indexing, in addition to the built-in test
# excludes above. Matched against repo-relative paths. .gitignore is always honored.
#
# datamancer is a small, pure-Rust workspace (crates/datamancer,
# crates/datamancer-core) plus Markdown docs and examples — all worth indexing —
# so there is nothing extra to exclude. Add globs here if a large generated,
# vendored, or fixture directory ever shows up and floods semantic results.
exclude = []

[embedder]
base_url = "http://localhost:8080"   # local llama.cpp serving an embedding model
model = "qwen3-embedding-4b"
[search]
default_k = 8
token_budget = 4000

[watch]
enabled = true      # set false to disable the filesystem watcher
debounce_ms = 200   # coalesce bursts of FS events into one reconcile
