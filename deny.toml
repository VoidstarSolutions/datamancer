# Dependency gates: licenses must stay permissive (the workspace itself is
# MIT OR Apache-2.0), advisories must be triaged, sources must be crates.io.

[graph]
all-features = true

[licenses]
# Permissive-only allowlist. Extending it with another PERMISSIVE license
# (BSD-family, ISC, Zlib, Unicode) is routine; adding any copyleft or
# source-available license (GPL/AGPL/LGPL/MPL/BUSL/SSPL) is a project
# decision - stop and raise it, do not just append.
#
# Entries below that carry a "(decision YYYY-MM-DD)" comment are
# already-decided project decisions (e.g. MPL-2.0 for option-ext), not
# routine appends - do not treat their presence as license alone.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "0BSD",                # enum-iterator, enum-iterator-derive (via iceoryx2-bb-posix)
    "Unlicense",            # ext-sort (via surrealdb-core)
    "CDLA-Permissive-2.0",  # webpki-root-certs (via rustls-platform-verifier -> reqwest -> oxidized_alpaca)
    "BSL-1.0",              # xxhash-rust (via surrealkv -> surrealdb-core); Boost Software License, permissive - do not confuse with BUSL-1.1
    "MPL-2.0",              # option-ext (via directories); file-level copyleft, unmodified use imposes nothing on this project (decision 2026-07-03)
]

# TRANSITIONAL (decision 2026-07-03): the SurrealDB storage backend is being
# replaced by a Turso (SQLite-compatible, MIT) backend - see
# docs/superpowers/specs/2026-07-03-turso-storage-design.md. Until that port
# lands and storage-surreal is removed, the surrealdb crates' BUSL-1.1
# license is tolerated via the scoped exceptions below. Remove this whole
# block (and the two advisory ignores referencing it) with the port.
[[licenses.exceptions]]
allow = ["BUSL-1.1"]
name = "surrealdb"
[[licenses.exceptions]]
allow = ["BUSL-1.1"]
name = "surrealdb-core"
[[licenses.exceptions]]
allow = ["BUSL-1.1"]
name = "surrealdb-types"
[[licenses.exceptions]]
allow = ["BUSL-1.1"]
name = "surrealdb-protocol"
[[licenses.exceptions]]
allow = ["BUSL-1.1"]
name = "surrealdb-types-derive"

[licenses.private]
# The three unpublished workspace binaries/libs (publish = false) don't carry
# a license field yet; workspace licensing lands in a separate sub-project.
# Skip license enforcement for local, unpublished workspace members only -
# this does not affect any third-party dependency.
ignore = true

[advisories]
yanked = "deny"
# Both ignores are TRANSITIONAL, rooted in the surrealdb tree, and leave with
# it (see the licenses.exceptions block above). Neither has an upstream fix.
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x unmaintained; via surrealmx -> surrealdb-core; removed with the Turso storage port" },
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin timing side-channel, no patched release; via jsonwebtoken -> surrealdb-core; not network-exposed by datamancer (cache auth is local); removed with the Turso storage port" },
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/VoidstarSolutions/oxidized-alpaca", # datamancer's own Alpaca provider fork, not yet published to crates.io
]
