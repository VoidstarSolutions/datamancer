[package]
name = "datamancer"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
futures-util = { version = "0.3", features = ["sink", "std"] }
redis = { version = "0.23", features = ["aio", "tokio-comp"] }
apca = "0.26"
futures = "0.3"
redis_ts = { version = "0.5", features = ["tokio-comp"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_repr = "0.1"
spinners = "4.1"
tokio = { version = "1.0", features = ["full"] }
tokio-stream = "0.1"
tokio-tungstenite = { version = "0.19", features = ["native-tls"] }
url = "2.4"

intercom = { path = "../intercom" }
supermodel = { path = "../supermodel" }

[dev-dependencies]
serial_test = "2.0"
